name: CI

on:
  push:
  pull_request:

jobs:
  non-hardware-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke checks
        run: python scripts/smoke_check.py
